<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin - PawPal{% endblock %}</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
  /* ── Reset ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'DM Sans', sans-serif;
    background: #F3F4F6;
    overflow-x: hidden;
  }

  /* ── Wrapper: flex row, full height ── */
  .admin-wrapper {
    display: flex;
    flex-direction: row;
    min-height: 100vh;
    width: 100%;
    position: relative;
  }

  /* ── Sidebar ── */
  .admin-sidebar {
    width: 260px;
    min-width: 260px;      /* never shrinks */
    max-width: 260px;      /* never grows */
    flex-shrink: 0;        /* CRITICAL: sidebar stays fixed width */
    background: #0F1B2D;
    min-height: 100vh;
    height: 100vh;
    position: sticky;      /* sticks while scrolling */
    top: 0;
    left: 0;
    overflow-y: auto;
    z-index: 200;
  }

  /* ── Main area: takes ALL remaining space ── */
  .admin-main {
    flex: 1;               /* takes remaining width after sidebar */
    min-width: 0;          /* CRITICAL: allows flex child to shrink below content size */
    max-width: calc(100% - 260px); /* never wider than viewport minus sidebar */
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* ── Top bar ── */
  .admin-topbar {
    background: #FFFFFF;
    height: 65px;
    padding: 0 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    position: sticky;
    top: 0;
    z-index: 199;
    width: 100%;
  }

  /* ── Content area ── */
  .admin-content {
    padding: 28px;
    flex: 1;
    width: 100%;
    overflow-x: hidden;    /* no horizontal scroll on content */
  }

  /* ── Table fix: always inside content, never overflows ── */
  .table-responsive {
    width: 100%;
    overflow-x: auto;      /* horizontal scroll INSIDE the content area */
    border-radius: 12px;
  }

  .table-responsive table,
  table.admin-table {
    width: 100%;
    min-width: 500px;      /* table scrolls horizontally if needed */
    table-layout: auto;
  }

  /* Force table to never be wider than content area */
  .admin-content .card {
    width: 100%;
    overflow: hidden;
  }

  /* ── Sidebar nav links ── */
  .sidebar-link {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 24px;
    color: rgba(255,255,255,0.75);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s ease;
    border-left: 3px solid transparent;
  }
  .sidebar-link:hover {
    background: rgba(255,255,255,0.06);
    color: #ffffff;
    border-left-color: rgba(245,197,24,0.5);
  }
  .sidebar-link.active {
    background: rgba(245,197,24,0.1);
    color: #F5C518;
    border-left-color: #F5C518;
    font-weight: 600;
  }
  .sidebar-link.logout-link {
    color: #FCA5A5;
  }
  .sidebar-link.logout-link:hover {
    background: rgba(239,68,68,0.1);
    color: #EF4444;
    border-left-color: #EF4444;
  }

  /* ── Stat cards ── */
  .stat-card {
    background: white;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    border-left: 4px solid;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .stat-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.10);
  }

  /* ── Table styling ── */
  .admin-table thead th {
    background: #F9FAFB;
    color: #6B7280;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    padding: 14px 16px;
    border-bottom: 2px solid #E5E7EB;
    white-space: nowrap;
  }
  .admin-table tbody td {
    padding: 14px 16px;
    font-size: 14px;
    color: #374151;
    border-bottom: 1px solid #F3F4F6;
    vertical-align: middle;
  }
  .admin-table tbody tr:hover {
    background: #F9FAFB;
  }
  .admin-table tbody tr:last-child td {
    border-bottom: none;
  }

  /* ── Responsive: collapse sidebar on mobile ── */
  @media (max-width: 768px) {
    .admin-sidebar {
      position: fixed;
      left: -260px;
      transition: left 0.3s ease;
      z-index: 999;
    }
    .admin-sidebar.open {
      left: 0;
    }
    .admin-main {
      max-width: 100%;
    }
    .admin-content {
      padding: 16px;
    }
  }

  /* Admin Layout */
  .admin-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--primary);
    color: var(--navy);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 16px;
    margin-right: 12px;
  }

  .admin-info {
    flex: 1;
  }

  .admin-name {
    color: white;
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 2px;
  }

  .admin-email {
    color: rgba(255,255,255,0.6);
    font-size: 12px;
  }

  .logout-link {
    color: #EF4444;
    text-decoration: none;
    font-size: 14px;
    display: flex;
    align-items: center;
    padding: 8px 0;
    transition: color 0.2s ease;
  }

  .logout-link:hover {
    color: #DC2626;
  }

  /* Topbar Styles */
  .breadcrumb-custom {
    background: transparent;
    padding: 0;
    margin: 0;
    font-size: 14px;
  }

  .breadcrumb-custom .breadcrumb-item {
    color: var(--gray-500);
  }

  .breadcrumb-custom .breadcrumb-item.active {
    color: var(--navy);
    font-weight: 600;
  }

  .topbar-actions {
    display: flex;
    align-items: center;
    gap: 16px;
  }

        .admin-email {
            color: rgba(255,255,255,0.6);
            font-size: 12px;
        }

        .logout-link {
            color: #EF4444;
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            padding: 8px 0;
            transition: color 0.2s ease;
        }

        .logout-link:hover {
            color: #DC2626;
        }

        /* Topbar Styles */
        .breadcrumb-custom {
            background: transparent;
            padding: 0;
            margin: 0;
            font-size: 14px;
        }

        .breadcrumb-custom .breadcrumb-item {
            color: var(--gray-500);
        }

        .breadcrumb-custom .breadcrumb-item.active {
            color: var(--navy);
            font-weight: 600;
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .notification-bell {
            position: relative;
            color: var(--gray-500);
            font-size: 20px;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .notification-bell:hover {
            color: var(--navy);
        }

        .notification-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--danger);
            color: white;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 4px;
            border-radius: 10px;
            min-width: 16px;
            text-align: center;
        }

        /* Tables */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            min-width: 600px;
        }

        .table {
            background: white;
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .table thead {
            background: var(--gray-50);
            border-bottom: 2px solid var(--gray-200);
        }

        .table th {
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            font-weight: 600;
            color: var(--gray-500);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            padding: 14px 16px;
            border: none;
        }

        .table td {
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            color: var(--gray-700);
            padding: 14px 16px;
            border: none;
            border-bottom: 1px solid var(--gray-100);
        }

        .table tbody tr:hover {
            background: var(--gray-50);
        }

        /* Buttons */
        .btn-sm {
            padding: 6px 12px;
            font-size: 13px;
            border-radius: var(--radius-sm);
            font-weight: 500;
        }

        /* Stats Cards */
        .stats-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s ease;
            border-left: 4px solid transparent;
        }

        .stats-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .stats-card.border-blue {
            border-left-color: #3B82F6;
        }

        .stats-card.border-green {
            border-left-color: var(--success);
        }

        .stats-card.border-yellow {
            border-left-color: var(--warning);
        }

        .stats-card.border-purple {
            border-left-color: #8B5CF6;
        }

        .stats-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .stats-label {
            color: var(--gray-500);
            font-size: 14px;
            font-weight: 500;
        }

        .stats-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .stats-icon.blue {
            background: rgba(59, 130, 246, 0.1);
            color: #3B82F6;
        }

        .stats-icon.green {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .stats-icon.yellow {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
        }

        .stats-icon.purple {
            background: rgba(139, 92, 246, 0.1);
            color: #8B5CF6;
        }

        .stats-number {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 8px;
        }

        .stats-trend {
            font-size: 13px;
            color: var(--gray-500);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .admin-sidebar {
                transform: translateX(-100%);
                position: fixed;
                z-index: 1000;
            }

            .admin-sidebar.show {
                transform: translateX(0);
            }

            .admin-main {
                margin-left: 0;
            }

            .admin-content {
                padding: 16px;
            }

            .admin-topbar {
                padding: 0 16px;
            }

            .stats-number {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
  <div class="admin-wrapper">

    <!-- SIDEBAR -->
    <aside class="admin-sidebar">
      <!-- Logo -->
      <div style="padding:24px 24px 16px;border-bottom:1px solid rgba(255,255,255,0.08);">
        <span style="font-family:'Playfair Display',serif;color:white;
                     font-size:20px;font-weight:700;">🐾 PawPal Admin</span>
      </div>

      <!-- Nav -->
      <nav style="padding:16px 0;">
        <p style="padding:8px 24px;color:rgba(255,255,255,0.35);
                  font-size:10px;letter-spacing:1.2px;text-transform:uppercase;
                  font-weight:600;">Main Menu</p>

        <a href="{{ url_for('admin.dashboard') }}" 
           class="sidebar-link {% if request.endpoint == 'admin.dashboard' %}active{% endif %}">
          🏠 <span>Dashboard</span>
        </a>
        <a href="{{ url_for('admin.pets') }}" 
           class="sidebar-link {% if 'admin.pet' in request.endpoint %}active{% endif %}">
          🐾 <span>Pets</span>
        </a>
        <a href="{{ url_for('admin.users') }}" 
           class="sidebar-link {% if request.endpoint == 'admin.users' %}active{% endif %}">
          👥 <span>Users</span>
        </a>
        <a href="{{ url_for('admin.requests') }}" 
           class="sidebar-link {% if request.endpoint == 'admin.requests' %}active{% endif %}">
          📋 <span>Requests</span>
        </a>
        <a href="{{ url_for('admin.services') }}" 
           class="sidebar-link {% if 'admin.service' in request.endpoint %}active{% endif %}">
          🏥 <span>Services</span>
        </a>

        <div style="margin-top:16px;border-top:1px solid rgba(255,255,255,0.08);padding-top:16px;">
          <a href="{{ url_for('auth.logout') }}" class="sidebar-link logout-link">
            🚪 <span>Logout</span>
          </a>
        </div>
      </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <div class="admin-main">

      <!-- Top bar -->
      <header class="admin-topbar">
        <div>
          <span style="font-size:13px;color:#9CA3AF;">Admin</span>
          <span style="color:#D1D5DB;margin:0 6px;">/</span>
          <span style="font-size:14px;font-weight:600;color:#0F1B2D;">
            {% block page_title %}Dashboard{% endblock %}
          </span>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
          <span style="font-size:14px;color:#6B7280;">
            {{ current_user.name }}
          </span>
          <div style="width:36px;height:36px;background:#0F1B2D;color:white;
                      border-radius:50%;display:flex;align-items:center;
                      justify-content:center;font-weight:700;font-size:14px;">
            {{ current_user.name[0].upper() }}
          </div>
        </div>
      </header>

      <!-- Page content -->
      <main class="admin-content">
        {% block content %}{% endblock %}
      </main>

    </div><!-- end admin-main -->

  </div><!-- end admin-wrapper -->

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
