{% extends "base_admin.html" %}
{% block page_title %}Edit Service{% endblock %}
{% block content %}

<div class="d-flex align-items-center gap-3 mb-4">
  <a href="{{ url_for('admin.services') }}" 
     style="color:#6B7280;text-decoration:none;font-size:14px;">
    ← Back to Services
  </a>
</div>

<div style="max-width:680px;">

  <div class="mb-4">
    <h4 style="font-family:'Playfair Display',serif;
               font-weight:700;color:#0F1B2D;margin:0;">
      Edit Service
    </h4>
    <p style="color:#6B7280;font-size:14px;margin:6px 0 0;">
      Update the details for "{{ service.name }}".
    </p>
  </div>

  <div style="background:white;border-radius:20px;padding:36px;
              box-shadow:0 2px 12px rgba(0,0,0,0.07);">
    <form method="POST" 
          action="{{ url_for('admin.edit_service', service_id=service.id) }}">

      <div class="row g-3 mb-3">
        <div class="col-md-7">
          <label class="form-label fw-600" 
                 style="font-size:13px;color:#374151;">
            Service Name <span style="color:#EF4444;">*</span>
          </label>
          <input type="text" name="name" required
                 value="{{ service.name }}"
                 class="form-control"
                 style="border-radius:10px;padding:11px 14px;
                        border:1.5px solid #E5E7EB;font-size:14px;">
        </div>
        <div class="col-md-5">
          <label class="form-label fw-600" 
                 style="font-size:13px;color:#374151;">
            Service Type <span style="color:#EF4444;">*</span>
          </label>
          <select name="service_type" required class="form-select"
                  style="border-radius:10px;padding:11px 14px;
                         border:1.5px solid #E5E7EB;font-size:14px;">
            <option value="vet" 
              {% if service.service_type == 'vet' %}selected{% endif %}>
              🏥 Veterinary
            </option>
            <option value="grooming" 
              {% if service.service_type == 'grooming' %}selected{% endif %}>
              ✂️ Grooming
            </option>
            <option value="training" 
              {% if service.service_type == 'training' %}selected{% endif %}>
              🎓 Training
            </option>
          </select>
        </div>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="form-label fw-600" 
                 style="font-size:13px;color:#374151;">
            Contact Number
          </label>
          <input type="text" name="contact"
                 value="{{ service.contact or '' }}"
                 class="form-control"
                 style="border-radius:10px;padding:11px 14px;
                        border:1.5px solid #E5E7EB;font-size:14px;">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-600" 
                 style="font-size:13px;color:#374151;">
            Location
          </label>
          <input type="text" name="location"
                 value="{{ service.location or '' }}"
                 class="form-control"
                 style="border-radius:10px;padding:11px 14px;
                        border:1.5px solid #E5E7EB;font-size:14px;">
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label fw-600" 
               style="font-size:13px;color:#374151;">
          Description
        </label>
        <textarea name="description" rows="4"
                  class="form-control"
                  style="border-radius:10px;padding:11px 14px;
                         border:1.5px solid #E5E7EB;font-size:14px;
                         resize:vertical;">{{ service.description or '' }}</textarea>
      </div>

      <div class="d-flex gap-3">
        <button type="submit"
                style="background:#F5C518;color:#0F1B2D;border:none;
                       padding:12px 32px;border-radius:999px;
                       font-weight:700;font-size:14px;cursor:pointer;">
          💾 Save Changes
        </button>
        <a href="{{ url_for('admin.services') }}"
           style="padding:12px 28px;border-radius:999px;
                  border:1.5px solid #E5E7EB;color:#6B7280;
                  text-decoration:none;font-size:14px;font-weight:500;
                  display:inline-flex;align-items:center;">
          Cancel
        </a>
      </div>

    </form>
  </div>
</div>

{% endblock %}
