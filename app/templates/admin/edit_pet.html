{% extends "admin/base.html" %}

{% block title %}Edit Pet{% endblock %}

{% block page_title %}Edit Pet: {{ pet.name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="name" class="form-label">Pet Name *</label>
                            <input type="text" class="form-control" id="name" name="name" value="{{ pet.name }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="species" class="form-label">Species *</label>
                            <select class="form-control" id="species" name="species" required>
                                <option value="">Select Species</option>
                                <option value="dog" {{ 'selected' if pet.species == 'dog' }}>Dog</option>
                                <option value="cat" {{ 'selected' if pet.species == 'cat' }}>Cat</option>
                                <option value="bird" {{ 'selected' if pet.species == 'bird' }}>Bird</option>
                                <option value="other" {{ 'selected' if pet.species == 'other' }}>Other</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="breed" class="form-label">Breed</label>
                            <input type="text" class="form-control" id="breed" name="breed" value="{{ pet.breed or '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="age" class="form-label">Age (years)</label>
                            <input type="number" class="form-control" id="age" name="age" value="{{ pet.age or '' }}" min="0" step="1">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="health_status" class="form-label">Health Status</label>
                        <input type="text" class="form-control" id="health_status" name="health_status" value="{{ pet.health_status or '' }}" placeholder="e.g., Healthy, Vaccinated, Special care needed">
                    </div>

                    <div class="mb-3">
                        <label for="status" class="form-label">Status</label>
                        <select class="form-control" id="status" name="status">
                            <option value="available" {{ 'selected' if pet.status == 'available' }}>Available</option>
                            <option value="adopted" {{ 'selected' if pet.status == 'adopted' }}>Adopted</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="image_url" class="form-label">Image URL</label>
                        <input type="url" class="form-control" id="image_url" name="image_url" value="{{ pet.image_url or '' }}" placeholder="https://example.com/pet-image.jpg">
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description" rows="4" placeholder="Describe the pet's personality, habits, and any special requirements...">{{ pet.description or '' }}</textarea>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('admin.pets') }}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">Update Pet</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
