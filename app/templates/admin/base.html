<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Panel - PawPal{% endblock %}</title>
    
    <!-- Google Fonts - Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #EEF0FF;
            --primary-color: #F5C842;
            --primary-hover: #E5B832;
            --card-bg: #FFFFFF;
            --navbar-bg: #FFFFFF;
            --text-primary: #1A1A2E;
            --text-secondary: #6B7280;
            --border-color: #E5E7EB;
            --footer-bg: #1A1A2E;
            --sidebar-bg: #1A1A2E;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-size: 16px;
            line-height: 1.6;
            margin: 0;
            padding: 0;
        }

        /* Admin Sidebar */
        .admin-sidebar {
            background-color: var(--sidebar-bg);
            min-height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            padding: 30px 20px;
            z-index: 1000;
        }

        .admin-sidebar .logo {
            color: white;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 40px;
            text-align: center;
        }

        .admin-sidebar .nav-link {
            color: rgba(255,255,255,0.8);
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 8px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .admin-sidebar .nav-link:hover,
        .admin-sidebar .nav-link.active {
            background-color: rgba(245, 200, 66, 0.1);
            color: var(--primary-color);
            border-left: 4px solid var(--primary-color);
        }

        .admin-sidebar .nav-link span {
            margin-right: 12px;
        }

        .admin-content {
            margin-left: 280px;
            min-height: 100vh;
            background-color: #F3F4F6;
        }

        .admin-footer {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            text-align: center;
        }

        /* Card Styles */
        .card {
            background-color: var(--card-bg);
            border: none;
            border-radius: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        /* Button Styles */
        .btn-primary {
            background-color: var(--primary-color) !important;
            border: none !important;
            color: var(--text-primary) !important;
            border-radius: 50px;
            padding: 12px 28px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover) !important;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(245, 200, 66, 0.3);
        }

        /* Badge Styles */
        .badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 500;
            font-size: 12px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .admin-sidebar {
                transform: translateX(-100%);
            }
            
            .admin-content {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <!-- Admin Sidebar -->
    <div class="admin-sidebar">
        <div class="logo">🐾 PawPal Admin</div>
        
        <nav class="nav flex-column">
            <a href="{{ url_for('admin.dashboard') }}" class="nav-link {% if request.endpoint == 'admin.dashboard' %}active{% endif %}">
                <span>🏠</span> Dashboard
            </a>
            <a href="{{ url_for('admin.pets') }}" class="nav-link {% if request.endpoint == 'admin.pets' %}active{% endif %}">
                <span>🐾</span> Pets
            </a>
            <a href="{{ url_for('admin.users') }}" class="nav-link {% if request.endpoint == 'admin.users' %}active{% endif %}">
                <span>👥</span> Users
            </a>
            <a href="{{ url_for('admin.requests') }}" class="nav-link {% if request.endpoint == 'admin.requests' %}active{% endif %}">
                <span>📋</span> Requests
            </a>
            <a href="{{ url_for('admin.services') }}" class="nav-link {% if request.endpoint == 'admin.services' %}active{% endif %}">
                <span>🏥</span> Services
            </a>
            <a href="{{ url_for('auth.logout') }}" class="nav-link">
                <span>🚪</span> Logout
            </a>
        </nav>
        
        <div class="admin-footer">
            <div>👤 {{ current_user.name }}</div>
            <div>{{ current_user.email }}</div>
        </div>
    </div>

    <!-- Main Content -->
    {% block content %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
